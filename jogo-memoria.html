<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória — Temas Aleatórios</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --fundo: #0f172a;
  --painel: #1e293b;
  --carta: #334155;
  --destaque: #38bdf8;
  --acerto: #22c55e;
  --erro: #ef4444;
  --texto: #f8fafc;
  --texto-fraco: #cbd5e1;
}

body {
  min-height: 100vh;
  font-family: 'Poppins', Arial, sans-serif;
  background: linear-gradient(135deg, var(--fundo), #020617);
  color: var(--texto);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 15px;
  transition: background 0.5s ease;
}

header {
  text-align: center;
  margin-bottom: 20px;
}

header h1 {
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-weight: 800;
  color: var(--destaque);
}

header p {
  color: var(--texto-fraco);
  font-size: 0.95rem;
  margin-top: 5px;
}

.tema-atual {
  background: var(--painel);
  border: 2px solid var(--destaque);
  padding: 10px 18px;
  border-radius: 30px;
  margin-bottom: 18px;
  font-weight: 600;
}

.placar {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
  flex-wrap: wrap;
  justify-content: center;
}

.stat {
  background: var(--painel);
  padding: 12px 20px;
  border-radius: 18px;
  min-width: 110px;
  text-align: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

.stat strong {
  display: block;
  color: var(--destaque);
  font-size: 1.8rem;
}

.stat span {
  color: var(--texto-fraco);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.grade {
  display: grid;
  grid-template-columns: repeat(4, 95px);
  gap: 12px;
  margin-bottom: 25px;
}

.carta {
  width: 95px;
  height: 95px;
  perspective: 700px;
  cursor: pointer;
}

.carta-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s ease;
}

.carta.virada .carta-inner,
.carta.acertada .carta-inner {
  transform: rotateY(180deg);
}

.face {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
  font-size: 2.4rem;
  box-shadow: 0 8px 22px rgba(0,0,0,0.35);
}

.verso {
  background: var(--carta);
  border: 2px solid var(--destaque);
}

.frente {
  background: var(--painel);
  border: 2px solid var(--destaque);
  transform: rotateY(180deg);
}

.carta.acertada .frente {
  border-color: var(--acerto);
  box-shadow: 0 0 20px var(--acerto);
}

.carta.errado .carta-inner {
  animation: tremer 0.35s;
}

@keyframes tremer {
  0%, 100% { transform: rotateY(180deg) translateX(0); }
  25% { transform: rotateY(180deg) translateX(-7px); }
  50% { transform: rotateY(180deg) translateX(7px); }
  75% { transform: rotateY(180deg) translateX(-5px); }
}

button {
  background: var(--destaque);
  color: #020617;
  border: none;
  padding: 14px 30px;
  border-radius: 40px;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

.vitoria {
  display: none;
  margin-bottom: 20px;
  background: var(--painel);
  padding: 20px 30px;
  border-radius: 20px;
  text-align: center;
  border: 2px solid var(--acerto);
}

.vitoria.mostrar {
  display: block;
}

.vitoria h2 {
  color: var(--acerto);
}

@media (max-width: 480px) {
  .grade {
    grid-template-columns: repeat(4, 72px);
    gap: 8px;
  }

  .carta {
    width: 72px;
    height: 72px;
  }

  .face {
    font-size: 1.8rem;
    border-radius: 14px;
  }
}
</style>
</head>
<body>

<header>
  <h1 id="titulo">Jogo da Memória</h1>
  <p id="subtitulo">Clique em Novo Jogo para mudar o tema das cartas</p>
</header>

<div class="tema-atual" id="temaAtual">Tema: Tecnologia</div>

<div class="placar">
  <div class="stat">
    <strong id="tentativas">0</strong>
    <span>Tentativas</span>
  </div>
  <div class="stat">
    <strong id="acertos">0</strong>
    <span>Acertos</span>
  </div>
  <div class="stat">
    <strong id="tempo">0s</strong>
    <span>Tempo</span>
  </div>
</div>

<div class="grade" id="grade"></div>

<div class="vitoria" id="vitoria">
  <h2>🏆 Parabéns!</h2>
  <p id="mensagemVitoria">Você venceu!</p>
</div>

<button onclick="novoJogo()">↺ Novo Jogo</button>

<script>
const TEMAS = [
  {
    nome: 'Tecnologia',
    titulo: '💻 Memória Tech',
    subtitulo: 'Encontre os pares do mundo da tecnologia',
    iconeVerso: '💻',
    emojis: ['💻', '🖱️', '⌨️', '🖥️', '📱', '🤖', '💾', '🕹️'],
    cores: ['#0f172a', '#1e293b', '#334155', '#38bdf8', '#22c55e']
  },
  {
    nome: 'Comidas',
    titulo: '🍕 Memória Gourmet',
    subtitulo: 'Combine os pares de comidas deliciosas',
    iconeVerso: '🍽️',
    emojis: ['🍕', '🍔', '🍟', '🌭', '🍩', '🍪', '🍓', '🍉'],
    cores: ['#2b0b0b', '#451a1a', '#7f1d1d', '#fb923c', '#facc15']
  },
  {
    nome: 'Animais',
    titulo: '🐾 Memória Animal',
    subtitulo: 'Ache os pares dos bichinhos',
    iconeVerso: '🐾',
    emojis: ['🐶', '🐱', '🦊', '🐼', '🐸', '🦁', '🐵', '🐰'],
    cores: ['#052e16', '#14532d', '#166534', '#86efac', '#22c55e']
  },
  {
    nome: 'Espaço',
    titulo: '🚀 Memória Espacial',
    subtitulo: 'Explore o universo encontrando os pares',
    iconeVerso: '⭐',
    emojis: ['🚀', '🪐', '🌎', '🌙', '☄️', '👽', '🛰️', '🌌'],
    cores: ['#111827', '#312e81', '#4338ca', '#a78bfa', '#facc15']
  },
  {
    nome: 'Esportes',
    titulo: '⚽ Memória Esportiva',
    subtitulo: 'Encontre os pares dos esportes',
    iconeVerso: '🏆',
    emojis: ['⚽', '🏀', '🏈', '🎾', '🏐', '🥊', '🏓', '🏆'],
    cores: ['#172554', '#1e40af', '#2563eb', '#93c5fd', '#facc15']
  }
];

let temaAtual = 0;
let cartasViradas = [];
let bloqueado = false;
let acertos = 0;
let tentativas = 0;
let inicio = null;
let timer = null;
let tema = TEMAS[0];

function aplicarTema(t) {
  document.getElementById('titulo').textContent = t.titulo;
  document.getElementById('subtitulo').textContent = t.subtitulo;
  document.getElementById('temaAtual').textContent = 'Tema: ' + t.nome;

  document.documentElement.style.setProperty('--fundo', t.cores[0]);
  document.documentElement.style.setProperty('--painel', t.cores[1]);
  document.documentElement.style.setProperty('--carta', t.cores[2]);
  document.documentElement.style.setProperty('--destaque', t.cores[3]);
  document.documentElement.style.setProperty('--acerto', t.cores[4]);
}

function novoJogo() {
  temaAtual++;
  if (temaAtual >= TEMAS.length) temaAtual = 0;
  tema = TEMAS[temaAtual];
  iniciarJogo();
}

function iniciarJogo() {
  aplicarTema(tema);

  cartasViradas = [];
  bloqueado = false;
  acertos = 0;
  tentativas = 0;

  document.getElementById('tentativas').textContent = 0;
  document.getElementById('acertos').textContent = 0;
  document.getElementById('tempo').textContent = '0s';
  document.getElementById('vitoria').classList.remove('mostrar');

  clearInterval(timer);
  inicio = Date.now();
  timer = setInterval(() => {
    const segundos = Math.floor((Date.now() - inicio) / 1000);
    document.getElementById('tempo').textContent = segundos + 's';
  }, 1000);

  const cartas = embaralhar([...tema.emojis, ...tema.emojis]);
  const grade = document.getElementById('grade');
  grade.innerHTML = '';

  cartas.forEach(emoji => {
    const carta = document.createElement('div');
    carta.className = 'carta';
    carta.dataset.emoji = emoji;

    carta.innerHTML = `
      <div class="carta-inner">
        <div class="face verso">${tema.iconeVerso}</div>
        <div class="face frente">${emoji}</div>
      </div>
    `;

    carta.addEventListener('click', () => virarCarta(carta));
    grade.appendChild(carta);
  });
}

function virarCarta(carta) {
  if (
    bloqueado ||
    carta.classList.contains('virada') ||
    carta.classList.contains('acertada')
  ) return;

  carta.classList.add('virada');
  cartasViradas.push(carta);

  if (cartasViradas.length < 2) return;

  bloqueado = true;
  tentativas++;
  document.getElementById('tentativas').textContent = tentativas;

  const [c1, c2] = cartasViradas;

  if (c1.dataset.emoji === c2.dataset.emoji) {
    setTimeout(() => {
      c1.classList.add('acertada');
      c2.classList.add('acertada');
      cartasViradas = [];
      bloqueado = false;
      acertos++;
      document.getElementById('acertos').textContent = acertos;

      if (acertos === tema.emojis.length) vencer();
    }, 400);
  } else {
    c1.classList.add('errado');
    c2.classList.add('errado');

    setTimeout(() => {
      c1.classList.remove('virada', 'errado');
      c2.classList.remove('virada', 'errado');
      cartasViradas = [];
      bloqueado = false;
    }, 850);
  }
}

function vencer() {
  clearInterval(timer);
  const segundos = Math.floor((Date.now() - inicio) / 1000);
  document.getElementById('mensagemVitoria').textContent =
    `Você venceu o tema ${tema.nome} em ${tentativas} tentativas e ${segundos}s!`;
  document.getElementById('vitoria').classList.add('mostrar');
}

function embaralhar(array) {
  const novo = [...array];
  for (let i = novo.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [novo[i], novo[j]] = [novo[j], novo[i]];
  }
  return novo;
}

iniciarJogo();
</script>
</body>
</html>
