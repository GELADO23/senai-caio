<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de CEP</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .btn {
      border-radius: 10px;
    }

    input {
      border-radius: 10px !important;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card p-4 mx-auto" style="max-width: 500px;">
      <h2 class="text-center mb-4">🔎 Buscador de CEP</h2>

      <div class="mb-3">
        <label class="form-label">Digite o CEP</label>
        <input type="text" id="cep" class="form-control" placeholder="Ex: 01001000">
      </div>

      <button class="btn btn-primary w-100 mb-3" onclick="buscarCep()">
        Buscar CEP
      </button>

      <div id="resultado"></div>
    </div>
  </div>

  <script>
    async function buscarCep() {
      const cep = document.getElementById("cep").value.replace(/\D/g, "");
      const resultado = document.getElementById("resultado");

      if (cep.length !== 8) {
        resultado.innerHTML = `
          <div class="alert alert-danger">
            Digite um CEP válido com 8 números.
          </div>
        `;
        return;
      }

      resultado.innerHTML = `
        <div class="alert alert-info">
          Buscando informações...
        </div>
      `;

      try {
        const resposta = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const dados = await resposta.json();

        if (dados.erro) {
          resultado.innerHTML = `
            <div class="alert alert-warning">
              CEP não encontrado.
            </div>
          `;
          return;
        }

        resultado.innerHTML = `
          <div class="alert alert-success">
            <strong>CEP encontrado!</strong>
          </div>

          <ul class="list-group">
            <li class="list-group-item"><strong>Rua:</strong> ${dados.logradouro}</li>
            <li class="list-group-item"><strong>Bairro:</strong> ${dados.bairro}</li>
            <li class="list-group-item"><strong>Cidade:</strong> ${dados.localidade}</li>
            <li class="list-group-item"><strong>Estado:</strong> ${dados.uf}</li>
            <li class="list-group-item"><strong>DDD:</strong> ${dados.ddd}</li>
          </ul>
        `;
      } catch (erro) {
        resultado.innerHTML = `
          <div class="alert alert-danger">
            Erro ao buscar o CEP.
          </div>
        `;
      }
    }
  </script>

</body>
</html>
